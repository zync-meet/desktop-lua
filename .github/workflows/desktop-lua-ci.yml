name: Desktop Client CI
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Lua
        uses: leafo/gh-actions-lua@v10
      - name: Install Luacheck
        run: luarocks install luacheck
      - name: Lint codebase
        run: luacheck src/
